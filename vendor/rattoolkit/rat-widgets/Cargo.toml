[package]
name = "rat-widgets"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Small reusable TUI widgets for ratatui: dialogs, spinner, notifications, tree view, scroll state"

[dependencies]
ratatui = "0.30"
serde_json = { version = "1.0", optional = true }

[features]
default = ["persistence"]
persistence = ["dep:serde_json"]