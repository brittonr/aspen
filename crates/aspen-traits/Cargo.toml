[package]
name = "aspen-traits"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
repository = "https://github.com/brittonr/aspen"
description = "Core traits for Aspen distributed systems"

[dependencies]
# Async traits (optional, gated behind `async` feature)
async-trait = { version = "0.1", optional = true }

# Cluster types (for ClusterController trait)
aspen-cluster-types = { path = "../aspen-cluster-types", default-features = false }

# KV types (for KeyValueStore trait)
aspen-kv-types = { path = "../aspen-kv-types", default-features = false }

[dev-dependencies]
tokio = { version = "1.48", features = ["rt-multi-thread", "macros"] }

[features]
default = ["async"]
async = ["dep:async-trait"]
