[package]
name = "aspen-nix-cache-gateway"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "HTTP gateway translating Nix binary cache protocol to Aspen cluster RPC"

[[bin]]
name = "aspen-nix-cache-gateway"
path = "src/main.rs"

[dependencies]
# Aspen client for cluster connection
aspen-client = { workspace = true }
aspen-client-api = { workspace = true, features = ["ci"] }
aspen-cache = { workspace = true }
aspen-kv-types = { workspace = true }
aspen-traits = { workspace = true }
async-trait = "0.1"

# Aspen snix service trait implementations (for nar-bridge backend)
aspen-snix = { workspace = true, optional = true }
aspen-blob = { workspace = true, optional = true }
aspen-core = { workspace = true, optional = true }
snix-castore = { workspace = true, optional = true }
snix-store = { workspace = true, optional = true }
# Note: aspen-client needs blob-store feature for RpcBlobStore when snix-http is enabled

# nar-bridge: axum-based Nix binary cache HTTP server
nar-bridge = { workspace = true, optional = true }
axum = { version = "0.7", optional = true }

# Legacy HTTP server (used when snix-http feature is disabled)
hyper = { version = "1.6", features = ["http1", "server"], optional = true }
hyper-util = { version = "0.1", features = ["tokio"], optional = true }
http-body-util = { version = "0.1", optional = true }
bytes = { workspace = true }

# CLI
clap = { workspace = true, features = ["derive"] }

# Async runtime
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "net"] }

# Error handling
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

# Serialization
serde_json = { workspace = true }

[features]
default = ["legacy-http"]
# Use nar-bridge axum router (replaces hand-rolled hyper server)
snix-http = ["dep:nar-bridge", "dep:axum", "dep:aspen-snix", "dep:aspen-blob", "dep:aspen-core", "dep:snix-castore", "dep:snix-store", "aspen-client/blob-store"]
# Legacy hand-rolled hyper HTTP server
legacy-http = ["dep:hyper", "dep:hyper-util", "dep:http-body-util"]
