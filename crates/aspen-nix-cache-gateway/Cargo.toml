[package]
name = "aspen-nix-cache-gateway"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "HTTP gateway translating Nix binary cache protocol to Aspen cluster RPC"

[[bin]]
name = "aspen-nix-cache-gateway"
path = "src/main.rs"

[dependencies]
# Aspen client for cluster connection
aspen-client = { workspace = true }
aspen-client-api = { workspace = true, features = ["ci"] }
aspen-cache = { workspace = true }
aspen-kv-types = { workspace = true }
aspen-traits = { workspace = true }
async-trait = "0.1"

# HTTP server
hyper = { version = "1.6", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"
bytes = { workspace = true }

# CLI
clap = { workspace = true, features = ["derive"] }

# Async runtime
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "net"] }

# Error handling
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

# Serialization
serde_json = { workspace = true }
