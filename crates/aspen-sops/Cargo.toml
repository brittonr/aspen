[package]
name = "aspen-sops"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "SOPS CLI using Aspen Transit for key management"

[[bin]]
name = "aspen-sops"
path = "src/main.rs"

[dependencies]
# All SOPS library code now lives in aspen-secrets
aspen-secrets = { path = "../aspen-secrets", features = ["sops"] }

# gRPC key service bridge (optional) — stays in this crate
aspen-client = { path = "../aspen-client", optional = true }
aspen-client-api = { path = "../aspen-client-api", features = ["secrets"], optional = true }
aspen-transport = { path = "../aspen-transport", optional = true }
tonic = { version = "0.12", optional = true }
prost = { version = "0.13", optional = true }
tokio-stream = { version = "0.1", optional = true }

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Iroh networking (for connection types used by keyservice)
iroh = { version = "0.95.1", features = ["discovery-local-network", "discovery-pkarr-dht"], optional = true }

# Error handling
snafu = "0.8.9"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Async
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "fs", "sync", "time", "process"] }

# Serialization (needed by keyservice bridge)
serde = { version = "1.0", features = ["derive"], optional = true }
base64 = { version = "0.22", optional = true }
zeroize = { version = "1.8", features = ["derive"], optional = true }

[build-dependencies]
tonic-build = { version = "0.12", optional = true }

[dev-dependencies]
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "time"] }
tempfile = "3.10"

[features]
default = []
keyservice = [
    "dep:tonic",
    "dep:prost",
    "dep:tokio-stream",
    "dep:tonic-build",
    "dep:aspen-client",
    "dep:aspen-client-api",
    "dep:aspen-transport",
    "dep:iroh",
    "dep:serde",
    "dep:base64",
    "dep:zeroize",
]
full = ["keyservice"]
