[package]
name = "aspen-sops"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "SOPS CLI using Aspen Transit for key management"

[[bin]]
name = "aspen-sops"
path = "src/main.rs"

[dependencies]
# All SOPS library code now lives in aspen-secrets
aspen-secrets = { path = "../aspen-secrets", features = ["sops"] }

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Error handling
snafu = "0.8.9"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Async
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "fs", "sync", "time", "process"] }

[dev-dependencies]
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "time"] }
tempfile = "3.10"
