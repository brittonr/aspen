[package]
name = "aspen-crypto"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
repository = "https://github.com/brittonr/aspen"
description = "Dependency-light cryptographic primitives for Aspen reusable crates"
readme = "README.md"

[dependencies]
blake3 = "1.5"
hex = "0.4"
iroh-base = { version = "0.97.0", features = ["key"], optional = true }
rand = { version = "0.9", optional = true }
thiserror = "2.0"
tokio = { version = "1.48.0", features = ["fs"], optional = true }

[features]
default = []
identity = ["dep:iroh-base", "dep:rand", "dep:tokio"]

[dev-dependencies]
tempfile = "3.19"
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "fs"] }
