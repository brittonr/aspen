[package]
name = "aspen-crypto"
version = "0.1.0"
edition = "2024"
description = "Lightweight cryptographic primitives for Aspen (cookie validation, identity key lifecycle, key derivation)"
publish = false

[dependencies]
blake3 = "1.5"
hex = "0.4"
iroh = { version = "0.97.0", features = ["address-lookup-mdns", "address-lookup-pkarr-dht"] }
rand = "0.9"
thiserror = "2.0"
tokio = { version = "1.48.0", features = ["fs"] }

[dev-dependencies]
tempfile = "3.19"
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros"] }
