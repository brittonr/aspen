[package]
name = "aspen-forge-web"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "Web frontend for Aspen Forge served over HTTP/3 via iroh-h3"

[dependencies]
# Aspen client for cluster connection
aspen-client = { workspace = true }
aspen-client-api = { workspace = true }
aspen-core = { workspace = true }
aspen-transport = { workspace = true }
aspen-forge-protocol = { path = "../aspen-forge-protocol" }

# HTTP/3 serving via iroh
h3 = { workspace = true }
iroh = { version = "0.97.0", features = ["address-lookup-mdns", "address-lookup-pkarr-dht"] }
iroh-h3 = { workspace = true }
http = "1.0"
bytes = { workspace = true }

# Templating
maud = "0.26"

# Markdown rendering
pulldown-cmark = "0.13"

# Runtime
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal"] }

# Error handling
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

# CLI
clap = { workspace = true, features = ["derive"] }

# H3 compatibility proxy (optional, for embedded TCP bridging)
aspen-h3-proxy = { path = "../aspen-h3-proxy" }

# Serialization
serde = { workspace = true }

# Form parsing
form_urlencoded = "1.2"

# Time formatting
chrono = { workspace = true }

[[bin]]
name = "aspen-forge-web"
path = "src/main.rs"
