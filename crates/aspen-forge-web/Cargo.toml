[package]
name = "aspen-forge-web"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "Web frontend for Aspen Forge served over HTTP/3 via iroh-h3"

[dependencies]
# Aspen client for cluster connection
aspen-client = { workspace = true }
aspen-client-api = { workspace = true }
aspen-core = { workspace = true }
aspen-transport = { workspace = true }
aspen-forge-protocol = { path = "../aspen-forge-protocol" }

# HTTP/3 serving via iroh
h3 = { workspace = true }
iroh = { version = "0.97.0", features = ["address-lookup-mdns", "address-lookup-pkarr-dht"] }
iroh-h3 = { workspace = true }
http = "1.0"
bytes = { workspace = true }

# Templating
maud = "0.26"

# Markdown rendering
pulldown-cmark = "0.13"

# Diff computation
similar = "2.6"

# ANSI escape code to HTML conversion for CI log rendering
ansi-to-html = "0.2"
async-recursion = "1.1"

# Runtime
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal"] }

# Error handling
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

# CLI
clap = { workspace = true, features = ["derive"] }

# H3 compatibility proxy (optional, for embedded TCP bridging)
aspen-h3-proxy = { path = "../aspen-h3-proxy" }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Form parsing
form_urlencoded = "1.2"

# Time formatting
chrono = { workspace = true }

[dev-dependencies]
async-trait = "0.1"
blake3 = { workspace = true }
http = "1.0"
iroh = { version = "0.97.0" }
iroh-blobs = "0.99.0"
iroh-gossip = "0.97"
tempfile = "3.10"
aspen-blob = { workspace = true }
aspen-client = { workspace = true }
aspen-client-api = { workspace = true }
aspen-core = { workspace = true }
aspen-forge = { path = "../aspen-forge" }
aspen-rpc-core = { path = "../aspen-rpc-core" }
aspen-rpc-handlers = { path = "../aspen-rpc-handlers", features = ["forge", "blob"] }
aspen-testing-core = { path = "../aspen-testing-core" }
aspen-testing-patchbay = { path = "../aspen-testing-patchbay" }
aspen-transport = { workspace = true }
bitcoin_hashes = "0.15"
ctor = "0.4"
hex = "0.4"
nostr = { version = "0.44", default-features = true }
serde_json = { workspace = true }
patchbay = { git = "https://github.com/n0-computer/patchbay.git", rev = "e0c48e094ae11442b1ea374b6d4d8fd55a498ac1" }
rand = "0.9"

[features]
net = []

[[bin]]
name = "aspen-forge-web"
path = "src/main.rs"
