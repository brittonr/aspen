[package]
name = "aspen-secrets"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "SOPS-based secrets management and Vault-like secrets engine for Aspen"

[dependencies]
# Core Aspen crates
aspen-core = { path = "../aspen-core" }
aspen-auth = { path = "../aspen-auth" }
aspen-crypto = { path = "../aspen-crypto" }

# Age encryption (SOPS-compatible)
age = { version = "0.11", features = ["armor"] }

# Symmetric encryption (Transit engine)
chacha20poly1305 = "0.10"
aes-gcm = "0.10"  # SOPS compatibility (AES-256-GCM)
aes = "0.8"       # AesGcm<Aes256, U32> for Go sops 32-byte nonce compat

# Cryptographic utilities
blake3 = "1.5"
rand = "0.9"
zeroize = { version = "1.8", features = ["derive"] }

# PKI / X.509 certificates
rcgen = { version = "0.13", features = ["pem", "x509-parser"] }
x509-cert = { version = "0.2", features = ["pem"] }
der = "0.7"
time = "0.3"

# Ed25519 signing (for Transit engine)
ed25519-dalek = "2.1"

# Serialization
schemars = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
toml = "0.8"
postcard = { version = "1.0", features = ["alloc"] }
base64 = "0.22"
hex = "0.4"

# Error handling
thiserror = "2.0"
snafu = "0.8.9"
anyhow = "1.0"

# Async
async-trait = "0.1"
tokio = { version = "1.48.0", features = ["fs", "sync", "time"] }

# Iroh identity (for Ed25519 keys)
iroh = { version = "0.95.1", features = ["discovery-local-network", "discovery-pkarr-dht"] }

# Logging
tracing = "0.1"

# SOPS native encrypt/decrypt (feature-gated)
aspen-client = { path = "../aspen-client", optional = true }
aspen-client-api = { path = "../aspen-client-api", features = ["secrets"], optional = true }
aspen-transport = { path = "../aspen-transport", optional = true }
toml_edit = { version = "0.22", optional = true }
serde_yaml = { version = "0.9", optional = true }
chrono = { version = "0.4", optional = true }
regex = { version = "1", optional = true }
subtle = { version = "2.6", optional = true }
hmac = { version = "0.12", optional = true }
sha2 = { version = "0.10", optional = true }

[features]
default = []
sops = [
    "dep:aspen-client",
    "dep:aspen-client-api",
    "dep:aspen-transport",
    "dep:toml_edit",
    "dep:serde_yaml",
    "dep:chrono",
    "dep:regex",
    "dep:subtle",
    "dep:hmac",
    "dep:sha2",
]
full = ["sops"]

[dev-dependencies]
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "time"] }
tempfile = "3.10"
proptest = "1.0"
