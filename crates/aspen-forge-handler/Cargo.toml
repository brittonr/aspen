[package]
name = "aspen-forge-handler"
version = "0.1.0"
edition = "2024"
description = "Forge (decentralized Git) RPC handler for Aspen distributed cluster"
license = "AGPL-3.0-or-later"
repository = "https://github.com/brittonr/aspen"

[dependencies]
# RPC core abstractions (RequestHandler trait, ClientProtocolContext)
aspen-rpc-core = { path = "../aspen-rpc-core", features = ["blob", "forge"] }

# Local crates
aspen-client-api = { workspace = true }
aspen-core = { package = "aspen-core-shell", path = "../aspen-core-shell" }
aspen-blob = { path = "../aspen-blob" }
aspen-plugin-api = { path = "../aspen-plugin-api" }
aspen-forge = { path = "../aspen-forge" }
aspen-cluster = { path = "../aspen-cluster", features = ["federation"] }
aspen-auth = { path = "../aspen-auth" }

# Hook system for push event emission
aspen-hooks = { path = "../aspen-hooks", optional = true }
aspen-hooks-types = { path = "../aspen-hooks-types", optional = true }

# Core dependencies
tracing = "0.1"
anyhow = "1.0"
async-trait = "0.1"
serde_json = "1.0"
tokio = { version = "1.0", features = ["rt"] }

# Iroh dependencies
iroh = { version = "0.97.0" }

# Hash and encoding dependencies
blake3 = { workspace = true }
sha1 = "0.10"
hex = "0.4"
base64 = "0.22"
postcard = { version = "1.0", features = ["alloc"] }
uuid = { version = "1.0", features = ["v4"] }

[features]
default = []
git-bridge = ["aspen-forge/git-bridge"]
global-discovery = ["aspen-rpc-core/global-discovery", "aspen-core/global-discovery"]
hooks = ["dep:aspen-hooks", "dep:aspen-hooks-types", "aspen-rpc-core/hooks"]

[dev-dependencies]
aspen-testing-core = { path = "../aspen-testing-core" }
tokio = { version = "1.0", features = ["full", "test-util"] }
rand = "0.9"
serde_json = "1.0"
