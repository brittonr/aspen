[package]
name = "aspen-dag"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
repository = "https://github.com/brittonr/aspen"
description = "Composable DAG traversal and sync protocol for content-addressed graphs"

[dependencies]
# P2P networking
iroh = "0.97.0"
iroh-blobs = "0.99.0"

# Hashing
blake3 = "1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
postcard = { version = "1.1", features = ["alloc"] }

# Error handling
snafu = "0.8.9"

# Async
tokio = { version = "1.48.0", features = ["io-util", "sync"] }

# Logging
tracing = "0.1"

# Bytes
bytes = "1.7"

# Encoding
hex = "0.4"

# BAO tree for incremental verification framing
bao-tree = "0.16.0"

[dev-dependencies]
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "test-util"] }
proptest = "1.6"
rand = { version = "0.9", features = ["std_rng"] }
patchbay = { git = "https://github.com/n0-computer/patchbay.git", rev = "e0c48e094ae11442b1ea374b6d4d8fd55a498ac1" }
aspen-testing-patchbay = { path = "../aspen-testing-patchbay" }
ctor = "0.4"
criterion = { version = "0.5", features = ["html_reports", "async_tokio"] }

[[bench]]
name = "dag_sync_bench"
harness = false

[features]
default = []
testing = []
