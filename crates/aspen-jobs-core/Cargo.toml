[package]
name = "aspen-jobs-core"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "Reusable job contracts and deterministic helpers for Aspen jobs and CI"

[dependencies]
chrono = { workspace = true, features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
uuid = { version = "1.0", features = ["v4", "serde"] }

[dev-dependencies]
serde_json = "1.0"
