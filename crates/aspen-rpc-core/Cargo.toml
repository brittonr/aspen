[package]
name = "aspen-rpc-core"
version = "0.1.0"
edition = "2024"
description = "Core RPC abstractions for Aspen distributed cluster handlers"
license = "AGPL-3.0-or-later"
repository = "https://github.com/brittonr/aspen"

[dependencies]
# Reusable RPC request/response and dispatch surface.
aspen-client-api = { workspace = true }
aspen-constants = { workspace = true }

# Runtime context dependencies. Kept optional so the default dispatch surface
# does not pull in the Aspen node service graph.
aspen-core = { package = "aspen-core-shell", path = "../aspen-core-shell", optional = true }
aspen-auth = { path = "../aspen-auth", optional = true }
aspen-hooks-types = { workspace = true, optional = true }
aspen-hooks = { path = "../aspen-hooks", optional = true }
aspen-jobs = { path = "../aspen-jobs", optional = true }
aspen-raft = { path = "../aspen-raft", optional = true }
aspen-transport = { workspace = true, optional = true }
aspen-sharding = { path = "../aspen-sharding", optional = true }
aspen-coordination = { path = "../aspen-coordination", optional = true }

# Async/trait support for reusable handlers.
async-trait = "0.1"
anyhow = "1.0"
serde = { workspace = true }

# Runtime-only support.
tokio = { version = "1.0", features = ["sync"], optional = true }
tracing = { version = "0.1", optional = true }
metrics = { workspace = true, optional = true }
metrics-exporter-prometheus = { workspace = true, optional = true }

# Optional domain dependencies (feature-gated).
aspen-blob = { path = "../aspen-blob", optional = true }
aspen-sql = { path = "../aspen-sql", optional = true }
aspen-forge = { path = "../aspen-forge", optional = true }
# Note: aspen-secrets is NOT included here because SecretsService is handler-specific
# and defined in aspen-rpc-handlers. Handler extraction will need trait abstraction.
aspen-ci = { path = "../aspen-ci", optional = true }
aspen-cluster = { path = "../aspen-cluster", optional = true, features = ["federation"] }
aspen-testing = { workspace = true, optional = true }
# Iroh is used only by the full Aspen runtime context adapter.
iroh = { version = "0.97.0", optional = true }

[features]
default = []
runtime-context = [
  "dep:aspen-core",
  "dep:aspen-auth",
  "dep:aspen-hooks-types",
  "dep:aspen-raft",
  "dep:aspen-transport",
  "dep:aspen-sharding",
  "dep:aspen-coordination",
  "dep:tokio",
  "dep:tracing",
  "dep:metrics",
  "dep:metrics-exporter-prometheus",
  "dep:iroh",
]
sql = ["runtime-context", "dep:aspen-sql"]
blob = ["runtime-context", "dep:aspen-blob", "aspen-blob/replication"]
forge-core = ["runtime-context", "dep:aspen-forge", "blob"]
forge-runtime = ["runtime-context", "dep:aspen-cluster"]
forge = ["forge-core", "forge-runtime"]
git-bridge = []
# secrets feature removed - SecretsService is handler-specific
ci-core = ["runtime-context", "dep:aspen-ci"]
ci-trigger = ["ci-core", "forge"]
ci = ["ci-core", "ci-trigger"]
# nickel feature enables TriggerService in ci_trigger_service context field
nickel = ["aspen-ci?/nickel"]
global-discovery = ["runtime-context", "aspen-core/global-discovery"]
worker-runtime = ["runtime-context", "dep:aspen-cluster", "aspen-cluster/jobs"]
worker = ["worker-runtime"]
deploy-runtime = ["runtime-context", "dep:aspen-cluster", "aspen-cluster/deploy"]
deploy = ["deploy-runtime"]
jobs-core = ["runtime-context", "dep:aspen-jobs"]
jobs = ["jobs-core"]
hooks = ["runtime-context", "dep:aspen-hooks"]
testing = ["runtime-context", "dep:aspen-testing"]

[dev-dependencies]
aspen-testing = { workspace = true }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full", "test-util"] }
