[package]
name = "aspen-hooks-ticket"
version = "0.1.0"
edition = "2024"
description = "Hook trigger ticket types for Aspen distributed systems"
license = "MIT OR Apache-2.0"
repository = "https://github.com/blixard/aspen"

[dependencies]
anyhow = "1"
iroh = { version = "0.97.0" }
iroh-tickets = "0.4.0"
postcard = { version = "1", features = ["alloc", "use-std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
proptest = "1"
