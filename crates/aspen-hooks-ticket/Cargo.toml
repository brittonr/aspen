[package]
name = "aspen-hooks-ticket"
version = "0.1.0"
edition = "2024"
description = "Hook trigger ticket types for Aspen distributed systems"
license = "AGPL-3.0-or-later"
repository = "https://github.com/blixard/aspen"

[features]
default = []
std = []

[dependencies]
aspen-cluster-types = { path = "../aspen-cluster-types", default-features = false }
iroh-tickets = "0.4.0"
postcard = { version = "1", default-features = false, features = ["alloc"] }
serde = { version = "1", default-features = false, features = ["derive"] }
serde_json = { version = "1", default-features = false, features = ["alloc"] }
thiserror = { version = "2", default-features = false }

[dev-dependencies]
iroh = { version = "0.97.0" }
proptest = "1"
trybuild = "1"
