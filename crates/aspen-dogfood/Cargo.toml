[package]
name = "aspen-dogfood"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
repository = "https://github.com/brittonr/aspen"
description = "Dogfood orchestrator for self-hosted Aspen build pipeline"
authors = ["Aspen Contributors"]

[[bin]]
name = "aspen-dogfood"
path = "src/main.rs"

[dependencies]
# Core Aspen dependencies
aspen-client = { path = "../aspen-client" }
aspen-client-api = { path = "../aspen-client-api" }
aspen-core = { package = "aspen-core-shell", path = "../aspen-core-shell", features = ["layer"] }
aspen-cluster = { path = "../aspen-cluster" }
aspen-ci-core = { path = "../aspen-ci-core" }
aspen-auth = { path = "../aspen-auth" }

# Async runtime
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "time", "sync", "process", "fs", "signal", "io-util"] }

# CLI framework
clap = { version = "4.5.4", features = ["derive", "env"] }

# Error handling
snafu = "0.8"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Process management
libc = "0.2"

# Misc
chrono = "0.4"
anyhow = "1.0"
iroh = { version = "0.97.0", features = ["address-lookup-mdns", "address-lookup-pkarr-dht"] }

[dev-dependencies]
tempfile = "3.10"
rand = { workspace = true }
