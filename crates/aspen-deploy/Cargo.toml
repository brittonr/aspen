[package]
name = "aspen-deploy"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "Deployment orchestration for Aspen rolling upgrades"

[features]
default = []
# Enable Verus formal verification ghost code
verus = []
# Enable real iroh QUIC RPC client for inter-node deploy communication
iroh = ["dep:iroh", "dep:aspen-client-api", "dep:aspen-core", "dep:postcard"]
# Enable branch-backed deployments
kv-branch = ["dep:aspen-kv-branch"]

[dependencies]
# Core types and traits
aspen-constants = { path = "../aspen-constants" }
aspen-kv-types = { path = "../aspen-kv-types" }
aspen-traits = { path = "../aspen-traits" }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
snafu = "0.8.9"
thiserror = "2.0"

# Async
async-trait = "0.1"
tokio = { version = "1.48.0", features = ["time", "sync"] }

# Logging
tracing = "0.1"

# Feature-gated: iroh RPC client
iroh = { version = "0.95.1", optional = true }
aspen-client-api = { workspace = true, optional = true }
aspen-core = { path = "../aspen-core", optional = true }
postcard = { version = "1.0", optional = true }
aspen-kv-branch = { path = "../aspen-kv-branch", optional = true }

[dev-dependencies]
# Tests
aspen-testing = { workspace = true }
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "time", "test-util"] }
