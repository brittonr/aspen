[package]
name = "aspen-deploy"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "Deployment orchestration for Aspen rolling upgrades"

[features]
default = []
# Enable Verus formal verification ghost code
verus = []

[dependencies]
# Core types and traits
aspen-constants = { path = "../aspen-constants" }
aspen-kv-types = { path = "../aspen-kv-types" }
aspen-traits = { path = "../aspen-traits" }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
snafu = "0.8.9"
thiserror = "2.0"

# Logging
tracing = "0.1"

[dev-dependencies]
# Tests
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros"] }
