[package]
name = "aspen-snix-bridge"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "gRPC bridge between snix-store CLI and Aspen's distributed storage"

[[bin]]
name = "aspen-snix-bridge"
path = "src/main.rs"

[dependencies]
# Aspen storage backends
aspen-snix = { workspace = true }
aspen-blob = { workspace = true }
aspen-core = { workspace = true }
aspen-testing = { workspace = true }

# Aspen client (for --ticket cluster connection)
aspen-client = { workspace = true, features = ["blob-store"] }
aspen-client-api = { workspace = true }
aspen-kv-types = { workspace = true }
aspen-traits = { workspace = true }
async-trait = "0.1"

# SNIX proto wrappers (gRPC server-side)
snix-castore = { workspace = true }
snix-store = { workspace = true }

# gRPC server — must match snix's tonic version (0.13)
tonic = "0.13"
tonic-health = "0.13"

# Async runtime
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "signal"] }
tokio-stream = { version = "0.1", features = ["net"] }

# Utilities
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4.5", features = ["derive"] }
