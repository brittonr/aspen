[package]
name = "aspen-testing-patchbay"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "Patchbay-based network simulation testing for Aspen distributed system"
authors = ["Aspen Contributors"]

[dependencies]
# Patchbay - network namespace simulation (pinned to specific revision)
patchbay = { git = "https://github.com/n0-computer/patchbay.git", rev = "e0c48e094ae11442b1ea374b6d4d8fd55a498ac1" }

# Core Aspen dependencies (minimal set for test nodes)
aspen-core = { path = "../aspen-core" }
aspen-constants = { path = "../aspen-constants" }
aspen-raft = { path = "../aspen-raft" }
aspen-raft-types = { path = "../aspen-raft-types" }
aspen-raft-network = { path = "../aspen-raft-network" }
aspen-redb-storage = { path = "../aspen-redb-storage" }
aspen-cluster = { path = "../aspen-cluster" }
aspen-cluster-types = { path = "../aspen-cluster-types" }
aspen-kv-types = { path = "../aspen-kv-types" }
aspen-traits = { path = "../aspen-traits" }
aspen-transport = { path = "../aspen-transport" }
aspen-sharding = { path = "../aspen-sharding" }

# Networking
iroh = { version = "0.95.1", features = ["discovery-local-network", "discovery-pkarr-dht"] }
iroh-base = "0.95.1"
iroh-gossip = "0.95"

# OpenRaft
openraft = { path = "../../openraft/openraft", features = ["serde", "type-alias"] }

# Async runtime
tokio = { version = "1.48.0", features = ["rt-multi-thread", "sync", "time", "macros", "process"] }
async-trait = "0.1"

# Error handling
anyhow = "1.0"
snafu = "0.8.9"

# Storage (for tmpdir-backed redb)
redb = "2.0.0"
tempfile = "3.4.0"

# Utilities
tracing = "0.1"
rand = "0.9"

[dev-dependencies]
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "test-util"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
ctor = "0.4"
