[package]
name = "aspen-storage-types"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
repository = "https://github.com/brittonr/aspen"
description = "Storage types for Aspen distributed systems"

[dependencies]
serde = { version = "1.0", default-features = false, features = ["alloc", "derive"] }
bincode = { version = "1.3", default-features = false }

[dev-dependencies]
postcard = { version = "1.0", features = ["alloc"] }
