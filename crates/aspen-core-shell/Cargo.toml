[package]
name = "aspen-core-shell"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "Std shell surface layered on top of alloc-only aspen-core"

[dependencies]
# Alloc-only core surface
aspen-core = { path = "../aspen-core", default-features = false }

# Optional shell bundles
aspen-layer = { path = "../aspen-layer", optional = true }

# Shell helpers
aspen-time = { path = "../aspen-time" }
aspen-disk = { path = "../aspen-disk" }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
snafu = { version = "0.8.9", default-features = false, features = ["rust_1_65"] }
anyhow = "1.0"
n0-future = "0.3.2"
tokio-util = "0.7"
tokio = { version = "1.48", features = ["rt-multi-thread", "macros", "sync", "time"] }
iroh = { version = "0.97.0", features = ["address-lookup-mdns", "address-lookup-pkarr-dht"] }
iroh-blobs = { version = "0.99.0", optional = true }
rand = "0.9"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
serde_json = "1.0"
hex = "0.4"

[dev-dependencies]
postcard = { version = "1.0", features = ["alloc"] }

[features]
default = []
sql = ["aspen-core/sql"]
layer = ["dep:aspen-layer"]
global-discovery = ["dep:iroh-blobs"]
