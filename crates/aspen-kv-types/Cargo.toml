[package]
name = "aspen-kv-types"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
repository = "https://github.com/brittonr/aspen"
description = "Key-value operation types for Aspen distributed systems"

[dependencies]
# Constants (for validation limits)
aspen-constants = { path = "../aspen-constants", default-features = false }

# Serialization
serde = { version = "1.0", default-features = false, features = ["alloc", "derive"] }

# Error handling
thiserror = { version = "2.0", default-features = false }

[dev-dependencies]
serde_json = "1.0"
