# Aspen Tiger Style configuration — full integration.
#
# All 32 lints are enabled workspace-wide. Thresholds tightened to tigerstyle
# defaults where possible. Violations surface as warnings during development
# and will fail CI via `nix flake check` (checks.tigerstyle).

[tigerstyle]
# Tigerstyle default: 70. Aspen targets this.
function_length_max = 70

# Tigerstyle default: 3. Aspen targets this.
nesting_max_depth = 3

# Assertion density: flag functions over 20 lines with fewer than 2 assertions.
assertion_density_min_lines = 20
assertion_density_min_assertions = 2

# Tigerstyle default: 5.
max_parameters = 5

# Transport and storage code use `IO` pervasively.
acronym_allowlist = ["IO"]

# All lints enabled — no disabled_lints.

# Promote allow-by-default lints to warn for full coverage.
[tigerstyle.lint_levels]
numeric_units = "warn"
compound_condition = "warn"
unjustified_allow = "warn"
assertion_density = "warn"
multi_lock_ordering = "warn"
float_for_currency = "warn"
ambiguous_params = "warn"
raw_arithmetic_overflow = "warn"
